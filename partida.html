<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-slate-900 text-white">
    <h1 class="text-3xl text-center mt-40 font-bold font-bangers">PARTIDA</h1>
    <div class="flex flex-col bg-slate-800 rounded-xl m-5 p-5 justify-center">
        <p class="font-bold text-xl">Nombre: <span id="name" class="text-blue-400"></span></p>
        <p class="font-bold text-xl">Sala: <span id="room" class="text-blue-400"></span></p>
    </div>
    <div class="flex flex-col bg-slate-800 rounded-xl m-5 p-5 justify-center">
        <p class="font-bold text-xl">Jugadores:</p>
        <div class="flex  gap-2 my-2">
            <input type="text" id="addplayer"
                class="bg-slate-700 hover:bg-slate-700 border-2 max-md:w-full border-slate-600 text-white py-2 px-4 rounded"
                placeholder="Nombre">
            <button id="addplayerbutton" class="bg-blue-400 hover:bg-blue-500 text-white font-bold py-2 px-4 rounded">
                <p class="hidden md:block">Agregar</p> <i class="fas fa-user-plus"></i>
            </button>
        </div>
        <div id="players" class="flex p-5 flex-col">
            <li class="font-bold text-xl">
                <p id="player1"></p>
            </li>
        </div>
    </div>
    <div class="m-5">
        <button id="startgame" class="bg-blue-400 hover:bg-blue-500  w-full text-white font-bold py-2 px-4 rounded">
            <p class="hidden md:block">Iniciar Partida</p> <i class="fas fa-play"></i>
        </button>
    </div>
    <!-- modal iniciar partida -->
    <div id="modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden">
        <div class="bg-slate-800 p-5 rounded-xl">
            <h1 class="text-3xl text-center mb-10 font-bold font-bangers">INICIAR PARTIDA</h1>
            <p class="font-bold text-xl">Jugadores: <span id="playerscount" class="text-blue-400"></span></p>
            <div class="flex mb-3 justify-between">
                <p class="font-bold text-xl">Impostores: <span id="impostorscount" class="text-blue-400"></span></p>
                <button id="addimpostor"
                    class="bg-red-800 hover:bg-red-900 text-red-400 text-xs font-bold py-2 px-2 rounded-md">
                    <p class="hidden md:block">Añadir</p> <i class="fas fa-user-plus"></i>
                </button>
            </div>
            <p class="font-bold text-xl">Tematica: <span id="tematica" class="text-blue-400">Ninguna</span></p>
            <!-- carrusel para elegir tematica -->
            <div class="flex items-center justify-center gap-4 my-5">
                <button id="carouselPrev"
                    class="bg-slate-700 hover:bg-slate-600 text-white rounded-full w-10 h-10 flex items-center justify-center focus:outline-none">
                    <i class="fas fa-chevron-left"></i>
                </button>
                <div id="carouselItems" class="flex-1 flex justify-center min-w-[150px]"></div>
                <button id="carouselNext"
                    class="bg-slate-700 hover:bg-slate-600 text-white rounded-full w-10 h-10 flex items-center justify-center focus:outline-none">
                    <i class="fas fa-chevron-right"></i>
                </button>
            </div>
            <p class="text-xl font-bold">¿Estas seguro de iniciar la partida?</p>
            <div class="flex justify-between gap-2 mt-5">
                <button id="cancel"
                    class="bg-red-400 hover:bg-red-500 flex items-center gap-2 text-white text-sm font-bold py-2 px-4 rounded">
                    <p class="md:block">Cancelar</p> <i class="fas fa-times"></i>
                </button>
                <button id="confirm"
                    class="bg-blue-400 hover:bg-blue-500 flex items-center gap-2 text-white text-sm font-bold py-2 px-4 rounded">
                    <p class="md:block">Confirmar</p> <i class="fas fa-check"></i>
                </button>
            </div>
        </div>
    </div>
</body>

<script>
    // obtener datos de localstorage para mostrar en la partida
    let name = localStorage.getItem('name');
    let room = localStorage.getItem('room');

    document.getElementById('name').textContent = name;
    document.getElementById('room').textContent = room;

    // player 1 es el id name
    document.getElementById('player1').textContent = name;
    // boton para agregar jugadores
    document.getElementById('addplayerbutton').addEventListener('click', () => {
        let player = document.getElementById('addplayer').value;
        if (player.trim() === '') return;

        let li = document.createElement('li');
        li.className = 'font-bold mt-2 flex justify-between text-xl';
        li.innerHTML = `<p>${player}</p><button class="bg-red-800 hover:bg-red-900 text-red-400 text-xs font-bold py-2 px-2 rounded-md"><i class="fas fa-trash"></i></button>`;

        document.getElementById('players').appendChild(li);

        // LIMPIAR INPUT
        document.getElementById('addplayer').value = '';

        // boton para eliminar jugadores
        li.querySelector('button').addEventListener('click', () => {
            li.remove();
        });
    });

    let impostorCount = 1;

    // boton para iniciar partida
    document.getElementById('startgame').addEventListener('click', () => {
        document.getElementById('modal').classList.remove('hidden');
        document.getElementById('room').textContent = room;
        document.getElementById('playerscount').textContent = document.getElementById('players').children.length;
        document.getElementById('impostorscount').textContent = impostorCount;
    });

    // en impostor nada mas se pueda agregar ya que los tripulantes son los jugadores solo se elije cuantos impostores seran para 
    // que sean elegidos aleatoriamente
    document.getElementById('addimpostor').addEventListener('click', () => {
        let playersCount = document.getElementById('players').children.length;
        let maxImpostors = playersCount > 1 ? playersCount - 1 : 1;

        if (impostorCount < maxImpostors) {
            impostorCount++;
        } else {
            impostorCount = 1; // Reiniciar si llega al máximo
        }
        document.getElementById('impostorscount').textContent = impostorCount;
    });

    // boton para cancelar
    document.getElementById('cancel').addEventListener('click', () => {
        document.getElementById('modal').classList.add('hidden');
    });

    // carrusel para elegir tematica variables globales
    let selectedTheme = 'Ninguna';
    let selectedImage = '';
    let currentIndex = 0;

    document.addEventListener('DOMContentLoaded', () => {
        const carouselItemsContainer = document.getElementById('carouselItems');
        const nextButton = document.getElementById('carouselNext');
        const prevButton = document.getElementById('carouselPrev');
        const themeText = document.getElementById('tematica');

        const items = [
            { title: 'Lugares', image: 'Assets/1.svg' },
            { title: 'Deportes', image: 'Assets/2.svg' },
            { title: 'Politica', image: 'Assets/3.svg' },
            { title: 'Farandula', image: 'Assets/4.svg' },
            { title: 'Baje de Pepa', image: 'Assets/5.svg' },
        ];

        function renderCarousel() {
            carouselItemsContainer.innerHTML = '';
            const item = items[currentIndex];

            const itemElement = document.createElement('div');
            itemElement.className = 'flex flex-col items-center cursor-pointer transition-transform transform hover:scale-105 p-3 px-6 rounded-xl border-2 ' + (selectedTheme === item.title ? 'border-blue-400 bg-slate-700' : 'border-transparent hover:bg-slate-700');
            itemElement.innerHTML = `
                <img src="${item.image}" alt="${item.title}" class="w-36 h-36 object-contain mb-2">
                <h3 class="font-bold">${item.title}</h3> 
            `;
            itemElement.addEventListener('click', () => {
                selectedTheme = item.title;
                selectedImage = item.image;
                themeText.textContent = selectedTheme;
                renderCarousel();
            });
            carouselItemsContainer.appendChild(itemElement);
        }

        nextButton.addEventListener('click', () => {
            currentIndex = (currentIndex + 1) % items.length;
            renderCarousel();
        });

        prevButton.addEventListener('click', () => {
            currentIndex = (currentIndex - 1 + items.length) % items.length;
            renderCarousel();
        });

        renderCarousel();

        // boton para confirmar
        document.getElementById('confirm').addEventListener('click', () => {
            // Guardar jugadores e impostores para el juego tambien con la tematica seleccionada
            let playerNames = Array.from(document.getElementById('players').children).map(li => li.querySelector('p').textContent);
            localStorage.setItem('players', JSON.stringify(playerNames));
            localStorage.setItem('impostors', impostorCount);
            localStorage.setItem('theme', selectedTheme);
            localStorage.setItem('themeImage', selectedImage);

            window.location.href = 'juego.html';
        });
    });
</script>

</html>
