<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-slate-900 text-white">
    <h1 class="text-3xl text-center mt-40 font-bold font-bangers">BIENVENIDO IMPOSTOR</h1>
    <div class="flex flex-col bg-slate-800 rounded-xl m-5 p-5 justify-center">
        <div class="flex flex-col mb-5">
            <label for="name" class="font-bold">Nombre</label>
            <input type="text"
                class="bg-slate-700 hover:bg-slate-700 border-2 border-slate-600 text-white py-2 px-4 rounded"
                placeholder="Nombre">
        </div>
        <div class="flex flex-col">
            <label for="room" class="font-bold">Nombre de la partida</label>
            <input type="text"
                class="bg-slate-700 hover:bg-slate-700 border-2 border-slate-600 text-white py-2 px-4 rounded"
                placeholder="Nombre de la partida">
            <button class="bg-blue-400 hover:bg-blue-500 text-white font-bold py-2 px-4 rounded mt-10">Crear una
                partida</button>
        </div>
</body>

</html>
